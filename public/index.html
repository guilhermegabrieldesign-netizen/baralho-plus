<!DOCTYPE html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>Baralho+ | Hall</title>
    <link rel="stylesheet" href="/css/style.css" />
    <style>
      .arcade-home-shell {
        min-height: 100dvh;
        position: relative;
        overflow: hidden;
        background:
          linear-gradient(180deg, rgba(31, 21, 54, 0.16), rgba(15, 16, 32, 0.88)),
          url('/assets/backgrounds/lobby-bg.jpg') center top / cover no-repeat;
      }

      .arcade-home-shell::before {
        content: "";
        position: absolute;
        inset: 0;
        background:
          radial-gradient(circle at 50% 22%, rgba(211, 155, 255, 0.3), transparent 24%),
          radial-gradient(circle at 50% 70%, rgba(255, 174, 212, 0.18), transparent 28%),
          linear-gradient(180deg, rgba(36, 24, 68, 0.36), rgba(18, 18, 34, 0.8) 50%, rgba(17, 16, 31, 0.96));
        pointer-events: none;
      }

      .arcade-home-main {
        position: relative;
        z-index: 1;
        min-height: 100dvh;
        padding: 8px 6px 80px;
        display: flex;
        flex-direction: column;
        gap: 6px;
      }

      .home-games-area {
        margin-top: auto;
      }

      .home-topbar {
        display: grid;
        grid-template-columns: 86px minmax(0, 1fr);
        gap: 8px;
        align-items: center;
      }

      .home-player-orb {
        position: relative;
        width: 78px;
        height: 78px;
        border-radius: 50%;
        margin: 2px auto 0;
        border: 4px solid rgba(228, 242, 255, 0.92);
        box-shadow: 0 12px 24px rgba(0, 0, 0, 0.28);
        background:
          radial-gradient(circle at 35% 25%, rgba(255, 255, 255, 0.32), transparent 18%),
          radial-gradient(circle at 50% 50%, rgba(255, 76, 171, 0.22), rgba(67, 18, 91, 0.92));
        overflow: hidden;
      }

      .home-player-orb::before {
        content: "";
        position: absolute;
        inset: 10px;
        border-radius: inherit;
        background:
          linear-gradient(180deg, rgba(255, 49, 149, 0.2), rgba(38, 14, 69, 0.12)),
          radial-gradient(circle at 50% 0%, rgba(255, 213, 132, 0.4), transparent 22%);
      }

      .home-player-orb::after {
        content: "";
        position: absolute;
        left: 18px;
        right: 18px;
        bottom: -6px;
        height: 18px;
        border-radius: 12px;
        background: linear-gradient(180deg, #f7c95b, #946714);
        border: 1px solid rgba(255, 238, 193, 0.44);
      }

      .home-topbar-copy {
        min-width: 0;
        display: grid;
        gap: 6px;
      }

      .home-topbar-name {
        display: flex;
        align-items: center;
        gap: 8px;
        min-width: 0;
      }

      .home-topbar-name strong {
        font-size: 18px;
        font-weight: 600;
        color: #fff;
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
      }

      .home-topbar-badges {
        display: grid;
        grid-template-columns: minmax(0, 1fr) auto auto auto;
        gap: 8px;
        align-items: center;
      }

      .home-badge-rank,
      .home-badge-vip,
      .home-badge-coins,
      .home-badge-menu {
        min-height: 34px;
        border-radius: 18px;
        border: 1px solid rgba(255,255,255,0.08);
        background: linear-gradient(180deg, rgba(70, 62, 129, 0.9), rgba(53, 44, 97, 0.82));
        box-shadow: 0 12px 22px rgba(0, 0, 0, 0.2);
      }

      .home-badge-rank {
        display: flex;
        align-items: center;
        gap: 8px;
        padding: 0 12px;
        color: #9ee2ff;
        font-size: 12px;
        font-weight: 700;
      }

      .home-badge-rank::before {
        content: "";
        width: 16px;
        height: 16px;
        border-radius: 4px;
        transform: rotate(45deg);
        background: linear-gradient(180deg, #a7f0ff, #4fd3ff);
        box-shadow: 0 0 12px rgba(79, 211, 255, 0.36);
      }

      .home-badge-vip {
        display: flex;
        align-items: center;
        gap: 8px;
        padding: 0 14px;
        color: #ffe5a0;
        font-size: 12px;
        font-weight: 800;
      }

      .home-badge-vip::before {
        content: "";
        width: 14px;
        height: 14px;
        border-radius: 4px;
        transform: rotate(45deg);
        background: linear-gradient(180deg, #f8c88b, #ab6d2d);
      }

      .home-badge-coins {
        display: flex;
        align-items: center;
        gap: 8px;
        padding: 0 12px;
        color: #fff;
        font-size: 14px;
        font-weight: 700;
      }

      .home-badge-coins::before {
        content: "$";
        width: 18px;
        height: 18px;
        border-radius: 50%;
        display: grid;
        place-items: center;
        color: #5f3c00;
        font-size: 11px;
        font-weight: 900;
        background: radial-gradient(circle at 35% 25%, #fff8d1, #e4aa28 72%);
      }

      .home-badge-menu {
        width: 34px;
        display: grid;
        place-items: center;
        color: #f2f2ff;
        font-size: 16px;
      }

      .home-stage {
        position: relative;
        margin-top: 0;
      }

      .home-banner-torneio {
        margin: 0 12px 8px;
        padding: 16px 18px;
        background: linear-gradient(135deg, rgba(80,40,160,0.95), rgba(40,20,80,0.98));
        border: 1px solid rgba(124,58,237,0.4);
        border-radius: 18px;
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 12px;
        cursor: pointer;
        min-height: 110px;
      }

      .home-banner-left {
        display: flex;
        flex-direction: column;
        gap: 4px;
        flex: 1;
      }

      .home-banner-tag {
        font-size: 10px;
        font-weight: 800;
        letter-spacing: 1.5px;
        color: #c8a84b;
        text-transform: uppercase;
      }

      .home-banner-title {
        font-size: 22px;
        font-weight: 700;
        color: #fff;
        line-height: 1.2;
      }

      .home-banner-sub {
        font-size: 12px;
        color: rgba(255,255,255,0.6);
      }

      .home-banner-cta {
        margin-top: 8px;
        display: inline-block;
        background: #7c3aed;
        color: #fff;
        font-size: 13px;
        font-weight: 700;
        padding: 7px 16px;
        border-radius: 20px;
        width: fit-content;
      }

      .home-banner-icon {
        font-size: 52px;
        line-height: 1;
        flex-shrink: 0;
      }

      

      

      

      

      

      

      

      

      

      

      

      

      

      

      

      

      .home-hero-character {
        position: relative;
        width: 160px;
        height: 210px;
        z-index: 2;
      }

      .home-hero-character::before {
        content: "";
        position: absolute;
        left: 50%;
        top: 4px;
        width: 58px;
        height: 58px;
        border-radius: 50%;
        transform: translateX(-50%);
        background:
          radial-gradient(circle at 38% 26%, rgba(255,255,255,0.4), transparent 16%),
          linear-gradient(180deg, #ffd0be, #c88266);
        box-shadow: 0 0 0 10px rgba(62, 35, 96, 0.54);
      }

      .home-hero-character::after {
        content: "";
        position: absolute;
        left: 50%;
        top: 56px;
        width: 140px;
        height: 154px;
        transform: translateX(-50%);
        border-radius: 70px 70px 32px 32px;
        background:
          radial-gradient(circle at 50% 8%, rgba(255,255,255,0.22), transparent 18%),
          linear-gradient(180deg, #3b274f 0%, #5b3e7a 16%, #ab96d8 52%, #a9b6db 100%);
        box-shadow: 0 24px 34px rgba(0,0,0,0.28);
      }

      .home-hero-hair {
        position: absolute;
        left: 50%;
        top: 14px;
        width: 116px;
        height: 118px;
        transform: translateX(-50%);
        border-radius: 66px 66px 56px 56px;
        background:
          radial-gradient(circle at 70% 18%, rgba(182, 124, 255, 0.5), transparent 16%),
          linear-gradient(180deg, #33243c 0%, #4f3b6c 36%, #2d2236 100%);
        box-shadow: 0 16px 26px rgba(0,0,0,0.24);
      }

      .home-hero-arm-left,
      .home-hero-arm-right {
        position: absolute;
        top: 100px;
        width: 52px;
        height: 72px;
        border-radius: 30px;
        background: linear-gradient(180deg, #edb39c, #c58367);
        z-index: 3;
      }

      .home-hero-arm-left {
        left: 16px;
        transform: rotate(18deg);
      }

      .home-hero-arm-right {
        right: 10px;
        width: 58px;
        transform: rotate(-26deg);
      }

      .home-hero-glass {
        position: absolute;
        left: 48px;
        top: 102px;
        width: 24px;
        height: 48px;
        border-radius: 7px 7px 10px 10px;
        border: 2px solid rgba(255,255,255,0.7);
        background: linear-gradient(180deg, rgba(255,255,255,0.2), rgba(255,255,255,0.03));
        z-index: 4;
      }

      .home-hero-glass::after {
        content: "";
        position: absolute;
        left: 11px;
        bottom: -22px;
        width: 2px;
        height: 24px;
        background: rgba(255,255,255,0.8);
      }

      .home-hero-card {
        position: absolute;
        right: 18px;
        top: 140px;
        width: 26px;
        height: 40px;
        border-radius: 6px;
        transform: rotate(26deg);
        background:
          linear-gradient(180deg, rgba(255,255,255,0.14), transparent 26%),
          #293254;
        border: 2px solid rgba(255,255,255,0.42);
        z-index: 4;
      }

      .home-feed-bar {
        position: absolute;
        left: 0;
        right: 0;
        bottom: 18px;
        z-index: 4;
        display: flex;
        justify-content: flex-start;
      }

      .home-feed-pill {
        min-width: 240px;
        max-width: 264px;
        min-height: 42px;
        padding: 0 12px;
        display: flex;
        align-items: center;
        gap: 8px;
        border-radius: 6px;
        background: linear-gradient(180deg, rgba(56, 53, 102, 0.88), rgba(37, 35, 72, 0.96));
        border: 1px solid rgba(255,255,255,0.08);
        box-shadow: 0 12px 20px rgba(0,0,0,0.24);
      }

      .home-feed-avatar {
        width: 22px;
        height: 22px;
        border-radius: 4px;
        display: grid;
        place-items: center;
        font-size: 11px;
        font-weight: 800;
        color: #fff;
        background: rgba(255,255,255,0.14);
      }

      .home-feed-copy {
        min-width: 0;
        display: flex;
        align-items: center;
        gap: 4px;
        color: #fff;
        font-size: 11px;
      }

      .home-feed-copy strong,
      .home-feed-copy span {
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
      }

      .home-tabs-wrap {
        margin-top: 0;
        display: flex;
        justify-content: center;
      }

      .arcade-tabs {
        width: min(100%, 250px);
        min-height: 42px;
        padding: 4px;
        display: grid;
        grid-template-columns: repeat(2, 1fr);
        gap: 0;
        border-radius: 22px;
        background: linear-gradient(180deg, rgba(70, 58, 123, 0.82), rgba(53, 43, 98, 0.72));
        border: 1px solid rgba(255,255,255,0.08);
        box-shadow: 0 14px 22px rgba(0,0,0,0.22);
      }

      .arcade-tab {
        border: 0;
        border-radius: 18px;
        background: transparent;
        color: rgba(255,255,255,0.68);
        font-size: 13px;
        font-weight: 800;
      }

      .arcade-tab.active {
        color: #fff4d0;
        background: linear-gradient(180deg, rgba(134, 76, 255, 0.28), rgba(255,255,255,0.08));
      }

      .home-games-area {
        margin-top: 0;
      }

      .arcade-games-grid {
        display: grid;
        grid-template-columns: repeat(3, minmax(0, 1fr));
        gap: 4px;
      }

      .arcade-game-card {
        position: relative;
        min-height: 106px;
        padding: 8px;
        border-radius: 0;
        overflow: hidden;
        display: flex;
        flex-direction: column;
        justify-content: flex-end;
        align-items: flex-start;
        text-align: left;
        background: linear-gradient(135deg, rgba(153, 80, 255, 0.86), rgba(71, 193, 255, 0.82));
        border: 1px solid rgba(255,255,255,0.14);
        box-shadow: inset 0 1px 0 rgba(255,255,255,0.12);
      }

      .arcade-game-card::before {
        content: "";
        position: absolute;
        inset: 0;
        background:
          linear-gradient(180deg, rgba(255,255,255,0.12), transparent 24%),
          linear-gradient(180deg, transparent 42%, rgba(20, 17, 54, 0.56) 100%);
      }

      .arcade-game-card[data-accent="royal"] { background: linear-gradient(135deg, rgba(164, 83, 255, 0.92), rgba(84, 184, 255, 0.9)); }
      .arcade-game-card[data-accent="violet"] { background: linear-gradient(135deg, rgba(120, 79, 255, 0.92), rgba(86, 209, 255, 0.88)); }
      .arcade-game-card[data-accent="gold"] { background: linear-gradient(135deg, rgba(59, 214, 236, 0.92), rgba(91, 240, 226, 0.9)); }
      .arcade-game-card[data-accent="emerald"] { background: linear-gradient(135deg, rgba(132, 89, 255, 0.92), rgba(91, 167, 255, 0.9)); }
      .arcade-game-card[data-accent="ember"] { background: linear-gradient(135deg, rgba(114, 80, 255, 0.92), rgba(80, 176, 255, 0.88)); }
      .arcade-game-card[data-accent="ice"] { background: linear-gradient(135deg, rgba(121, 96, 255, 0.92), rgba(98, 185, 255, 0.88)); }

      .arcade-card-art-image {
        position: absolute;
        inset: 0;
        z-index: 0;
      }

      .arcade-card-art-image img {
        width: 100%;
        height: 100%;
        object-fit: cover;
      }

      .arcade-card-sheen,
      .arcade-card-icon,
      .arcade-card-copy,
      .timer-badge {
        position: relative;
        z-index: 1;
      }

      .arcade-card-sheen {
        position: absolute;
        inset: 0;
        background:
          radial-gradient(circle at 82% 22%, rgba(255, 219, 96, 0.38), transparent 12%),
          radial-gradient(circle at 24% 18%, rgba(255,255,255,0.22), transparent 14%);
      }

      .arcade-card-icon {
        min-width: 46px;
        min-height: 46px;
        display: grid;
        place-items: center;
        border-radius: 16px;
        font-size: 20px;
        font-weight: 900;
        color: rgba(255,255,255,0.94);
        text-shadow: 0 4px 12px rgba(0,0,0,0.22);
      }

      .arcade-card-copy {
        display: grid;
        gap: 2px;
      }

      .arcade-card-name {
        font-size: 14px;
        font-weight: 900;
        letter-spacing: -0.03em;
        color: #fff;
        text-shadow: 0 4px 12px rgba(0,0,0,0.3);
      }

      .arcade-card-subtitle,
      .arcade-card-meta {
        display: none;
      }

      .timer-badge {
        position: absolute;
        top: 4px;
        left: 4px;
        min-height: 20px;
        padding: 1px 6px;
        border-radius: 4px;
        font-size: 9px;
        font-weight: 900;
        color: #fff;
        background: rgba(121, 72, 255, 0.86);
      }

      .home-online-strip {
        margin: 0 12px 4px;
        padding: 7px 14px;
        background: rgba(15, 26, 15, 0.9);
        border: 0.5px solid rgba(34, 197, 94, 0.2);
        border-radius: 20px;
        display: flex;
        align-items: center;
        gap: 8px;
      }
      .home-online-dot {
        width: 6px; height: 6px;
        background: #22c55e;
        border-radius: 50%;
        animation: pulse-dot 2s infinite;
        flex-shrink: 0;
      }
      @keyframes pulse-dot {
        0%, 100% { opacity: 1; }
        50% { opacity: 0.4; }
      }
      .home-online-text { font-size: 12px; color: #4ade80; }
      .home-online-sep { font-size: 12px; color: #333; }
      .home-season-text { font-size: 12px; color: #555; }

      .arcade-game-card {
        position: relative;
        min-height: 90px;
        padding: 8px;
        border-radius: 0;
        overflow: hidden;
        display: flex;
        flex-direction: column;
        justify-content: flex-end;
        align-items: flex-start;
        text-align: left;
        background: linear-gradient(135deg, rgba(153, 80, 255, 0.86), rgba(71, 193, 255, 0.82));
        border: 1px solid rgba(255,255,255,0.14);
        box-shadow: inset 0 1px 0 rgba(255,255,255,0.12);
      }
        position: fixed;
        left: 0;
        right: 0;
        bottom: 0;
        z-index: 5;
      }

      .bottom-nav-arcade {
        height: 76px;
        min-height: 76px;
        background: linear-gradient(180deg, rgba(29, 27, 52, 0.98), rgba(20, 19, 38, 1));
        border-top: 1px solid rgba(255,255,255,0.08);
      }

      .bottom-nav-arcade .bottom-nav-inner {
        height: 100%;
        padding: 6px 4px 8px;
      }

      .bottom-nav-arcade .nav-item {
        gap: 4px;
        font-size: 11px;
        font-weight: 800;
      }

      .bottom-nav-arcade .nav-icon {
        width: 42px;
        height: 42px;
        border-radius: 14px;
        background: transparent;
        border: 0;
        font-size: 24px;
      }

      .bottom-nav-arcade .nav-item.active {
        color: #5e3900;
      }

      .bottom-nav-arcade .nav-item.active .nav-icon {
        background: linear-gradient(180deg, #fff4ac, #dfbb41);
        color: #6a4500;
        box-shadow: 0 10px 18px rgba(233, 199, 84, 0.28);
      }

      .bottom-nav-arcade .nav-item:nth-child(2) {
        position: relative;
      }

      .bottom-nav-arcade .nav-item:nth-child(2)::after {
        content: "1";
        position: absolute;
        top: 0;
        right: 18px;
        width: 14px;
        height: 14px;
        border-radius: 50%;
        display: grid;
        place-items: center;
        font-size: 9px;
        font-weight: 900;
        color: #fff;
        background: #ff5d57;
      }

      @media (max-width: 390px) {
        .home-banner-torneio { padding: 14px; min-height: 96px; }
        .home-banner-title { font-size: 19px; }
        .home-banner-icon { font-size: 44px; }
        .arcade-games-grid { gap: 3px; }
        .arcade-game-card { min-height: 84px; }
      }
    </style>

  </head>
  <body>
    <div class="page-container arcade-home-shell">
      <main class="arcade-home-main">
        <section class="home-topbar">
          <div class="home-player-orb" data-avatar-initial>G</div>

          <div class="home-topbar-copy">
            <div class="home-topbar-name">
              <strong data-username>Gui 9x2</strong>
            </div>
            <div class="home-topbar-badges">
              <div class="home-badge-rank" data-rank>Platina 1</div>
              <div class="home-badge-vip" data-vip-tier>VIP 1</div>
              <button class="home-badge-coins" onclick="App.goToStore()">
                <span data-coin-balance>12149</span>
                <span>+</span>
              </button>
              <button class="home-badge-menu" data-coming-soon data-title="Menu" data-description="Menu rapido em desenvolvimento.">?</button>
            </div>
          </div>
        </section>

        <section class="home-stage">
          <div class="home-banner-torneio" onclick="window.location.href='/modo-jogo.html'">
            <div class="home-banner-left">
              <span class="home-banner-tag">DESTAQUE DO DIA</span>
              <div class="home-banner-title">Torneio de Truco</div>
              <div class="home-banner-sub">Premio: 5.000 moedinhas</div>
              <div class="home-banner-cta">Participar</div>
            </div>
            <div class="home-banner-icon">🃏</div>
          </div>
          <div class="home-feed-bar" id="social-feed-root"></div>
        </section>

        <div class="home-online-strip">
          <div class="home-online-dot"></div>
          <span class="home-online-text" id="online-count">843 online</span>
          <span class="home-online-sep">·</span>
          <span class="home-season-text">Temporada 3 ativa</span>
        </div>

        <section class="home-tabs-wrap">
          <div class="arcade-tabs">
            <button class="arcade-tab active" data-tab="cartas">Poquer</button>
            <button class="arcade-tab" data-tab="mini">Mini Jogos</button>
          </div>
        </section>

        <section class="home-games-area">
          <div class="arcade-games-grid" id="games-grid"></div>
        </section>
      </main>

      <div class="home-bottom-nav">
        <div id="bottom-nav-root"></div>
      </div>
    </div>

    <script src="/socket.io/socket.io.js"></script>
    <script src="/js/app.js"></script>
    <script src="/js/home-hall.js"></script>
    <script>
      document.getElementById('bottom-nav-root').innerHTML = App.createBottomNav('hall');
      App.init();
      HomeHall.init();
    </script>
  </body>
</html>
