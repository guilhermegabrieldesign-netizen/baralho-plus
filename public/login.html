<!DOCTYPE html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>Baralho+ | Entrar</title>
    <link rel="stylesheet" href="/css/style.css" />
  </head>
  <body>
    <main class="page-container auth-screen auth-shell premium-page-shell">
      <section class="auth-hero premium-card">
        <div class="auth-hero-mark">♠</div>
        <div class="section-overline">Baralho+</div>
        <h1 class="auth-title">Entre no seu lounge de cartas</h1>
        <p class="auth-subtitle">Um app de jogos com atmosfera premium, partidas rapidas e uma mesa sempre pronta para voce.</p>
      </section>

      <section class="auth-card premium-card">
        <div class="brand auth-brand">
          <div class="brand-mark">♠</div>
          <div>
            <div class="section-title">Acesse sua conta</div>
            <div class="subtle">Entre para continuar suas partidas e manter seu saldo sincronizado.</div>
          </div>
        </div>

        <form id="login-form" class="auth-form premium-auth-form">
          <label class="auth-field">
            <span>Usuario</span>
            <input id="username" class="input-field" type="text" placeholder="Seu usuario" required />
          </label>
          <label class="auth-field">
            <span>Senha</span>
            <input id="password" class="input-field" type="password" placeholder="Sua senha" required />
          </label>
          <button id="login-button" class="btn-primary auth-submit" type="submit">Entrar</button>
        </form>

        <div class="auth-footer subtle">
          Ainda nao tem conta?
          <button id="toggle-register" class="btn-secondary auth-toggle" style="margin-top: 10px; width: 100%;">Criar conta</button>
        </div>
      </section>
    </main>

    <script src="/js/app.js"></script>
    <script>
      const form = document.getElementById('login-form');
      const button = document.getElementById('login-button');
      const toggleRegister = document.getElementById('toggle-register');
      let registerMode = false;

      App.init({ skipAuth: true }).then(async () => {
        const currentPlayer = await App.fetchCurrentPlayer();
        if (currentPlayer) {
          App.navigateWithFade('/index.html');
        }
      });

      function updateMode() {
        document.title = registerMode ? 'Baralho+ | Criar conta' : 'Baralho+ | Entrar';
        button.textContent = registerMode ? 'Criar conta' : 'Entrar';
        toggleRegister.textContent = registerMode ? 'Ja tenho conta' : 'Criar conta';
      }

      toggleRegister.addEventListener('click', (event) => {
        event.preventDefault();
        registerMode = !registerMode;
        updateMode();
      });

      form.addEventListener('submit', async (event) => {
        event.preventDefault();
        App.setLoading(button, true, 'Aguarde...');

        try {
          const payload = {
            username: document.getElementById('username').value.trim(),
            password: document.getElementById('password').value
          };

          const endpoint = registerMode ? '/auth/register' : '/auth/login';
          await App.fetchJson(endpoint, {
            method: 'POST',
            body: JSON.stringify(payload)
          });

          App.navigateWithFade('/index.html');
        } catch (error) {
          App.showFeedback(error.message, 'danger');
        } finally {
          App.setLoading(button, false);
        }
      });
    </script>
  </body>
</html>
