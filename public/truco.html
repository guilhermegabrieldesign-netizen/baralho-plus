<!DOCTYPE html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>Baralho+ | Mesa de Truco</title>
    <link rel="stylesheet" href="/css/style.css" />
    <style>
      .arcade-truco-shell {
        height: 100dvh;
        max-height: 100dvh;
        position: relative;
        overflow: hidden;
        display: flex;
        flex-direction: column;
        background:
          radial-gradient(circle at 50% 12%, rgba(255, 191, 74, 0.14), transparent 20%),
          radial-gradient(circle at 20% 0%, rgba(90, 130, 255, 0.14), transparent 18%),
          linear-gradient(180deg, #0b1220 0%, #081017 40%, #05090d 100%);
      }

      .arcade-truco-shell::before {
        content: "";
        position: absolute;
        inset: 0;
        background:
          radial-gradient(circle at 50% 42%, rgba(24, 120, 73, 0.24), transparent 28%),
          linear-gradient(180deg, rgba(255, 255, 255, 0.04), transparent 22%);
        pointer-events: none;
      }

      .arcade-truco-header {
        margin: 10px 12px 8px;
        padding: 12px 14px;
        border-radius: 24px;
        background: linear-gradient(180deg, rgba(18, 21, 31, 0.92), rgba(7, 10, 16, 0.88));
        border: 1px solid rgba(255, 255, 255, 0.08);
        box-shadow: 0 24px 36px rgba(0, 0, 0, 0.28);
      }

      .arcade-truco-scoreboard {
        display: grid;
        grid-template-columns: 1fr auto 1fr;
        align-items: center;
        gap: 12px;
      }

      .arcade-score-team {
        display: grid;
        gap: 2px;
        justify-items: center;
        font-size: 12px;
        text-transform: uppercase;
        letter-spacing: 0.08em;
      }

      .arcade-score-team strong {
        font-size: 40px;
        line-height: 0.92;
        letter-spacing: -0.06em;
      }

      .arcade-score-team-us {
        color: #71ffa6;
        text-shadow: 0 0 18px rgba(68, 244, 133, 0.26);
      }

      .arcade-score-team-them {
        color: #ff6f91;
        text-shadow: 0 0 18px rgba(255, 90, 130, 0.24);
      }

      .arcade-score-center {
        display: grid;
        justify-items: center;
        gap: 6px;
      }

      .arcade-clean-label,
      #current-value-label {
        min-height: 28px;
        padding: 6px 12px;
        border-radius: 999px;
        font-size: 11px;
        font-weight: 700;
        border: 1px solid rgba(255, 255, 255, 0.08);
      }

      .arcade-clean-label {
        color: #ffe4a2;
        background: linear-gradient(180deg, rgba(255, 189, 79, 0.18), rgba(255, 189, 79, 0.06));
      }

      #current-value-label {
        color: #dfe6ff;
        background: linear-gradient(180deg, rgba(92, 116, 255, 0.2), rgba(92, 116, 255, 0.08));
      }

      .rodada-dots {
        display: flex;
        gap: 8px;
      }

      .rodada-dots .dot {
        width: 9px;
        height: 9px;
        border-radius: 50%;
        background: rgba(255, 255, 255, 0.14);
      }

      .arcade-truco-tools {
        display: flex;
        align-items: center;
        gap: 8px;
      }

      .arcade-turn-timer,
      .arcade-settings {
        min-height: 42px;
        border-radius: 16px;
        border: 1px solid rgba(255, 255, 255, 0.08);
        background: rgba(255, 255, 255, 0.04);
        color: #fff;
      }

      .arcade-turn-timer {
        min-width: 66px;
        display: grid;
        place-items: center;
        font-size: 15px;
        font-weight: 800;
        color: #ffe4a2;
      }

      .arcade-settings {
        width: 42px;
      }

      .arcade-truco-table {
        position: relative;
        flex: 1;
        min-height: 0;
        margin: 0 12px;
        border-radius: 34px;
        overflow: hidden;
        background:
          radial-gradient(circle at 50% 50%, rgba(37, 170, 106, 0.16), transparent 28%),
          linear-gradient(180deg, rgba(22, 67, 49, 0.92), rgba(9, 28, 21, 0.96));
        border: 1px solid rgba(255, 255, 255, 0.08);
        box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.08), 0 28px 40px rgba(0, 0, 0, 0.28);
      }

      .arcade-truco-table::before {
        content: "";
        position: absolute;
        inset: 22px 18px 72px;
        border-radius: 50% / 34%;
        border: 2px solid rgba(255, 255, 255, 0.08);
        box-shadow: inset 0 0 40px rgba(0, 0, 0, 0.16);
        transform: perspective(900px) rotateX(58deg);
        transform-origin: center center;
        pointer-events: none;
      }

      .arcade-truco-table::after {
        content: "";
        position: absolute;
        inset: 34px 28px 90px;
        border-radius: 50% / 38%;
        background:
          radial-gradient(circle at center, rgba(255, 255, 255, 0.06), transparent 48%),
          radial-gradient(circle at center, rgba(255, 220, 120, 0.08), transparent 24%);
        transform: perspective(900px) rotateX(58deg);
        transform-origin: center center;
        pointer-events: none;
      }

      .arcade-table-center-mark {
        position: absolute;
        inset: 50% auto auto 50%;
        transform: translate(-50%, -50%);
        font-size: 56px;
        font-weight: 900;
        letter-spacing: 0.18em;
        color: rgba(255, 255, 255, 0.07);
        text-shadow: 0 12px 28px rgba(0, 0, 0, 0.22);
        pointer-events: none;
      }

      .arcade-opponent,
      .arcade-player-panel {
        position: absolute;
        z-index: 3;
        display: grid;
        gap: 8px;
        justify-items: center;
      }

      .arcade-partner {
        top: 16px;
        left: 50%;
        transform: translateX(-50%);
      }

      .arcade-left-player {
        left: 10px;
        top: 50%;
        transform: translateY(-56%);
      }

      .arcade-right-player {
        right: 10px;
        top: 50%;
        transform: translateY(-56%);
      }

      .arcade-player-panel {
        left: 14px;
        bottom: 14px;
        grid-template-columns: auto 1fr;
        align-items: center;
        justify-items: start;
      }

      .player-float-card {
        padding: 8px 10px;
        border-radius: 22px;
        background: linear-gradient(180deg, rgba(15, 19, 27, 0.9), rgba(8, 10, 16, 0.82));
        border: 1px solid rgba(255, 255, 255, 0.08);
        box-shadow: 0 22px 28px rgba(0, 0, 0, 0.22);
        backdrop-filter: blur(16px);
      }

      .arcade-table-avatar,
      .arcade-player-avatar {
        position: relative;
        width: 52px;
        height: 52px;
        border-radius: 50%;
        display: grid;
        place-items: center;
        font-size: 18px;
        font-weight: 800;
        color: #fff;
        background:
          radial-gradient(circle at 32% 24%, rgba(255, 255, 255, 0.24), transparent 20%),
          linear-gradient(180deg, #7e67ff, #38285d);
        border: 2px solid rgba(255, 255, 255, 0.14);
      }

      .arcade-table-avatar::after,
      .arcade-player-avatar::after {
        content: "";
        position: absolute;
        inset: -5px;
        border-radius: inherit;
        border: 1px solid rgba(255, 255, 255, 0.08);
        opacity: 0;
        transform: scale(0.9);
        transition: opacity 0.22s ease, transform 0.22s ease;
      }

      .arcade-opponent.current-turn .arcade-table-avatar,
      .arcade-player-panel.current-turn .arcade-player-avatar,
      .arcade-table-avatar.current-turn {
        box-shadow: 0 0 0 4px rgba(255, 209, 91, 0.12), 0 0 22px rgba(255, 209, 91, 0.32);
      }

      .arcade-opponent.current-turn .arcade-table-avatar::after,
      .arcade-player-panel.current-turn .arcade-player-avatar::after,
      .arcade-table-avatar.current-turn::after {
        opacity: 1;
        transform: scale(1);
      }

      .player-float-meta {
        display: grid;
        gap: 2px;
        justify-items: center;
        text-align: center;
      }

      .player-float-meta strong {
        font-size: 12px;
        color: #fff;
      }

      .player-float-meta span,
      .player-float-meta em {
        font-size: 10px;
        color: rgba(255, 255, 255, 0.64);
        font-style: normal;
      }

      .parceiro-cartas,
      .adversario-cartas {
        display: flex;
        align-items: center;
        justify-content: center;
      }

      .parceiro-cartas .truco-card-back,
      .adversario-cartas .truco-card-back {
        width: 26px;
        height: 38px;
        margin-left: -8px;
        border-radius: 8px;
      }

      .adversario-cartas {
        flex-direction: column;
      }

      .adversario-cartas .truco-card-back {
        margin-left: 0;
        margin-top: -16px;
      }

      .played-cards-layer {
        position: absolute;
        inset: 0;
        z-index: 2;
        pointer-events: none;
      }

      .played-anchor {
        position: absolute;
        width: 74px;
        height: 98px;
        display: grid;
        place-items: center;
      }

      .played-anchor-top {
        top: 112px;
        left: 50%;
        transform: translateX(-50%);
      }

      .played-anchor-left {
        left: 102px;
        top: 50%;
        transform: translateY(-50%);
      }

      .played-anchor-right {
        right: 102px;
        top: 50%;
        transform: translateY(-50%);
      }

      .played-anchor-bottom {
        left: 50%;
        bottom: 110px;
        transform: translateX(-50%);
      }

      .played-anchor .slot-card-content,
      .center-card,
      .played-card {
        width: 66px;
        height: 92px;
      }

      .center-card,
      .played-card {
        border-radius: 12px;
        box-shadow: 0 18px 24px rgba(0, 0, 0, 0.28);
      }

      .card-fly-wrap.card-played {
        animation-duration: 0.26s;
      }

      .arcade-turn-badge {
        position: absolute;
        left: 50%;
        bottom: 88px;
        transform: translateX(-50%);
        min-height: 38px;
        padding: 8px 16px;
        border-radius: 999px;
        background: linear-gradient(180deg, rgba(255, 194, 83, 0.2), rgba(255, 194, 83, 0.08));
        border: 1px solid rgba(255, 213, 124, 0.2);
        color: #ffeab6;
        font-size: 13px;
        font-weight: 700;
        box-shadow: 0 16px 24px rgba(0, 0, 0, 0.2);
      }

      .arcade-table-side {
        position: absolute;
        left: 12px;
        bottom: 92px;
        z-index: 4;
        display: grid;
        gap: 10px;
      }

      .arcade-side-button,
      .arcade-signal-button {
        border: 1px solid rgba(255, 255, 255, 0.08);
        background: linear-gradient(180deg, rgba(19, 21, 31, 0.92), rgba(9, 11, 16, 0.9));
        color: #fff;
        box-shadow: 0 18px 26px rgba(0, 0, 0, 0.24);
      }

      .arcade-side-button {
        width: 46px;
        height: 46px;
        border-radius: 16px;
      }

      .arcade-signal-button {
        position: absolute;
        right: 12px;
        bottom: 88px;
        z-index: 4;
        width: 68px;
        height: 68px;
        border-radius: 22px;
        font-size: 12px;
        font-weight: 800;
      }

      .arcade-truco-footer {
        position: relative;
        z-index: 5;
        margin: 10px 12px 12px;
        padding: 10px;
        display: grid;
        grid-template-columns: 1.25fr 1fr 1fr 1fr 1fr;
        gap: 8px;
        border-radius: 24px;
        background: linear-gradient(180deg, rgba(18, 20, 31, 0.96), rgba(7, 10, 16, 0.98));
        border: 1px solid rgba(255, 255, 255, 0.08);
        box-shadow: 0 24px 34px rgba(0, 0, 0, 0.28);
      }

      .arcade-truco-footer button {
        min-height: 48px;
        border-radius: 18px;
        border: 1px solid rgba(255, 255, 255, 0.08);
        font-size: 14px;
        font-weight: 800;
        color: #fff;
      }

      .btn-truco {
        position: relative;
        background: linear-gradient(180deg, #ff8f38 0%, #ff544f 52%, #7b2aff 100%);
        box-shadow: 0 0 24px rgba(255, 109, 66, 0.24), 0 18px 24px rgba(0, 0, 0, 0.22);
      }

      .btn-truco::before {
        content: "";
        position: absolute;
        inset: -1px;
        border-radius: inherit;
        background: linear-gradient(180deg, rgba(255,255,255,0.24), transparent 34%);
        pointer-events: none;
      }

      .btn-accept {
        background: linear-gradient(180deg, rgba(49, 171, 112, 0.9), rgba(22, 90, 62, 0.96));
      }

      .btn-raise {
        background: linear-gradient(180deg, rgba(106, 91, 255, 0.92), rgba(49, 34, 140, 0.96));
      }

      .btn-correr {
        background: linear-gradient(180deg, rgba(255, 255, 255, 0.08), rgba(255, 255, 255, 0.04));
      }

      .arcade-hand-zone {
        position: relative;
        z-index: 5;
        height: 156px;
        margin: -18px 12px 0;
        display: grid;
        align-items: end;
        justify-items: center;
      }

      .arcade-hand-fan {
        display: flex;
        align-items: end;
        justify-content: center;
      }

      .player-hand-card {
        margin: 0 -10px;
      }

      .player-card {
        width: 84px;
        height: 120px;
        border-radius: 14px;
        box-shadow: 0 22px 28px rgba(0, 0, 0, 0.32);
      }

      .player-hand-card:nth-child(1) .player-card { transform: rotate(-9deg) translateY(8px); }
      .player-hand-card:nth-child(2) .player-card { transform: translateY(-10px); }
      .player-hand-card:nth-child(3) .player-card { transform: rotate(9deg) translateY(8px); }

      .player-hand-card:hover .player-card,
      .player-hand-card.card-selected .player-card {
        transform: translateY(-18px) scale(1.03);
      }

      .truco-card-back {
        background:
          linear-gradient(135deg, rgba(255, 255, 255, 0.08), transparent 28%),
          linear-gradient(-45deg, rgba(255, 194, 83, 0.18), transparent 36%),
          #1a2030;
        border: 1px solid rgba(255, 255, 255, 0.08);
      }

      .result-toast,
      .truco-banner,
      .hand-result-toast {
        z-index: 6;
      }

      .truco-banner {
        top: 42%;
        padding: 16px 22px;
        border-radius: 20px;
        background: linear-gradient(180deg, rgba(255, 120, 56, 0.94), rgba(123, 42, 255, 0.92));
        box-shadow: 0 0 24px rgba(255, 120, 56, 0.28), 0 18px 30px rgba(0, 0, 0, 0.26);
      }

      @media (max-width: 390px) {
        .arcade-score-team strong { font-size: 34px; }
        .played-anchor-left { left: 82px; }
        .played-anchor-right { right: 82px; }
        .played-anchor-bottom { bottom: 102px; }
        .player-card { width: 76px; height: 110px; }
        .arcade-truco-footer {
          grid-template-columns: repeat(2, minmax(0, 1fr));
        }
        .btn-truco {
          grid-column: 1 / -1;
        }
      }
    </style>
  </head>
  <body>
    <div class="page-container arcade-truco-shell">
      <div class="truco-room-bg">
        <div class="truco-room-glow truco-room-glow-top"></div>
        <div class="truco-room-glow truco-room-glow-bottom"></div>
      </div>

      <header class="arcade-truco-header truco-floating-hud">
        <div class="arcade-truco-scoreboard">
          <div class="arcade-score-team arcade-score-team-us">Nós <strong id="score-a">0</strong></div>
          <div class="arcade-score-center">
            <span class="arcade-clean-label">LIMPO ♣4 ♥7 ♠A ♠7</span>
            <span id="current-value-label">1 ponto</span>
            <div class="rodada-dots">
              <span class="dot" id="dot-1"></span>
              <span class="dot" id="dot-2"></span>
              <span class="dot" id="dot-3"></span>
            </div>
          </div>
          <div class="arcade-score-team arcade-score-team-them">Eles <strong id="score-b">0</strong></div>
        </div>
        <div class="arcade-truco-tools">
          <div class="arcade-turn-timer"><span id="truco-timer">15</span>s</div>
          <button class="arcade-settings" data-nav-href="/index.html">▦</button>
        </div>
      </header>

      <main class="arcade-truco-table table">
        <div id="truco-banner" class="truco-banner hidden">TRUCO!</div>
        <div id="round-toast" class="result-toast hidden">Você venceu a rodada</div>

        <aside class="arcade-table-side left">
          <button class="arcade-side-button" data-coming-soon data-title="Microfone" data-description="Microfone da mesa em desenvolvimento.">🎤</button>
          <button class="arcade-side-button" data-coming-soon data-title="Chat" data-description="Chat rapido da mesa em desenvolvimento.">💬</button>
          <button class="arcade-side-button" data-coming-soon data-title="Emoji" data-description="Reacoes em desenvolvimento.">🙂</button>
        </aside>

        <section class="arcade-opponent arcade-partner player-float-card player-float-partner">
          <div id="avatar-2" class="arcade-table-avatar">P</div>
          <div class="arcade-table-meta player-float-meta">
            <strong id="player-name-2">Parceiro</strong>
            <span>4.767 · <em>3 cartas</em></span>
          </div>
          <div id="player-cards-2" class="parceiro-cartas"></div>
        </section>

        <section class="arcade-opponent arcade-left-player player-float-card player-float-enemy">
          <div id="avatar-1" class="arcade-table-avatar">E</div>
          <div class="arcade-table-meta player-float-meta">
            <strong id="player-name-1">MauMau</strong>
            <span>8.127</span>
          </div>
          <div id="player-cards-1" class="adversario-cartas"></div>
        </section>

        <section class="arcade-opponent arcade-right-player player-float-card player-float-enemy">
          <div id="avatar-3" class="arcade-table-avatar">D</div>
          <div class="arcade-table-meta player-float-meta">
            <strong id="player-name-3">Guest_1398</strong>
            <span>9.317</span>
          </div>
          <div id="player-cards-3" class="adversario-cartas"></div>
        </section>

        <div class="arcade-table-center-mark">TRUCO</div>

        <div class="played-cards-layer">
          <div id="slot-2" class="played-anchor played-anchor-top"><div class="slot-card-content"></div></div>
          <div id="slot-1" class="played-anchor played-anchor-left"><div class="slot-card-content"></div></div>
          <div id="slot-3" class="played-anchor played-anchor-right"><div class="slot-card-content"></div></div>
          <div id="slot-0" class="played-anchor played-anchor-bottom"><div class="slot-card-content"></div></div>
        </div>

        <div class="arcade-turn-badge" id="turn-chip">● Aguardando</div>

        <div class="arcade-player-panel player-float-card player-float-self" id="player-panel-0">
          <div class="arcade-player-avatar" id="avatar-0" data-avatar-initial>G</div>
          <div class="player-float-meta">
            <strong data-username>Jogador</strong>
            <span data-coin-balance>0</span>
          </div>
        </div>

        <button class="arcade-signal-button" data-coming-soon data-title="Signal" data-description="Tenho boas cartas | Pede truco | Corre | Aguenta">Signal</button>
      </main>

      <section class="arcade-hand-zone">
        <div id="my-hand" class="arcade-hand-fan"></div>
      </section>

      <footer class="arcade-truco-footer">
        <button id="truco-button" class="btn-truco">Truco!</button>
        <button id="accept-button" class="btn-accept hidden">Aceitar</button>
        <button id="raise-button" class="btn-raise hidden">Aumentar</button>
        <button id="run-button" class="btn-correr">Correr</button>
        <button id="waiting-button" class="btn-correr hidden" disabled>Aguardando...</button>
      </footer>

      <div id="hand-result-modal" class="hand-result-toast result-toast hidden">
        <div id="hand-result-text" class="hand-result-text">Mão vencida!</div>
      </div>

      <div id="preparing-overlay" class="preparing-overlay">
        <div class="preparing-card">
          <div class="preparing-avatars">
            <div class="truco-avatar avatar-self">V</div>
            <div class="truco-avatar avatar-enemy">E</div>
            <div class="truco-avatar avatar-partner">P</div>
            <div class="truco-avatar avatar-enemy">D</div>
          </div>
          <div class="section-title">Distribuindo cartas...</div>
          <div class="preparing-progress">
            <div id="preparing-progress-bar" class="preparing-progress-bar"></div>
          </div>
        </div>
      </div>
    </div>

    <script src="/js/app.js"></script>
    <script src="/js/deck-game.js"></script>
    <script src="/js/truco-core.js"></script>
    <script src="/js/truco.js"></script>
    <script>
      TrucoGame.init();
      setInterval(() => {
        const timer = document.getElementById('truco-timer');
        if (!timer) return;
        const next = Number(timer.textContent) <= 1 ? 15 : Number(timer.textContent) - 1;
        timer.textContent = String(next);
      }, 1000);
    </script>
  </body>
</html>
